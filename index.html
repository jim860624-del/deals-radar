<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣連鎖優惠雷達</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a3a;
    --accent: #ff4d6d;
    --accent2: #ffd166;
    --accent3: #06d6a0;
    --accent4: #4cc9f0;
    --text: #e8e8f0;
    --text-dim: #7a7a9a;
    --food: #ff6b35;
    --fashion: #e040fb;
    --living: #4fc3f7;
    --transport: #69f0ae;
    --edu: #ffab40;
    --fun: #f06292;
    --dept: #ce93d8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  /* Header */
  header {
    padding: 2rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 2rem;
    flex-wrap: wrap;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .logo {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .logo-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .logo h1 {
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .logo h1 span {
    color: var(--accent);
  }

  .header-meta {
    display: flex;
    gap: 1.5rem;
    align-items: center;
    margin-left: auto;
    flex-wrap: wrap;
  }

  .month-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    padding: 0.4rem 0.8rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
  }

  .month-badge strong { color: var(--accent2); }

  /* Search bar */
  .search-bar {
    padding: 1rem 2rem;
    display: flex;
    gap: 1rem;
    align-items: center;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .search-input-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-input-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 1rem 0.6rem 2.5rem;
    border-radius: 6px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input-wrap input:focus {
    border-color: var(--accent);
  }

  .search-icon {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 0.9rem;
  }

  /* Category tabs */
  .cat-tabs {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .cat-tab {
    padding: 0.4rem 0.9rem;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .cat-tab:hover { border-color: var(--text-dim); color: var(--text); }
  .cat-tab.active { border-color: currentColor; background: rgba(255,255,255,0.05); }
  .cat-tab[data-cat="all"].active { color: var(--text); border-color: var(--text); }
  .cat-tab[data-cat="食"].active { color: var(--food); border-color: var(--food); }
  .cat-tab[data-cat="衣"].active { color: var(--fashion); border-color: var(--fashion); }
  .cat-tab[data-cat="住"].active { color: var(--living); border-color: var(--living); }
  .cat-tab[data-cat="行"].active { color: var(--transport); border-color: var(--transport); }
  .cat-tab[data-cat="育"].active { color: var(--edu); border-color: var(--edu); }
  .cat-tab[data-cat="樂"].active { color: var(--fun); border-color: var(--fun); }
  .cat-tab[data-cat="百貨"].active { color: var(--dept); border-color: var(--dept); }
  .cat-tab[data-cat="🎂"].active { color: #ff8fab; border-color: #ff8fab; background: rgba(255,143,171,0.08); }

  /* Status filter */
  .status-tabs {
    display: flex;
    gap: 0.5rem;
    margin-left: auto;
  }

  .status-tab {
    padding: 0.4rem 0.9rem;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .status-tab.active[data-status="all"] { background: var(--surface2); color: var(--text); border-color: var(--text-dim); }
  .status-tab.active[data-status="active"] { background: rgba(6,214,160,0.1); color: var(--accent3); border-color: var(--accent3); }
  .status-tab.active[data-status="upcoming"] { background: rgba(255,209,102,0.1); color: var(--accent2); border-color: var(--accent2); }
  .status-tab.active[data-status="expired"] { background: rgba(255,77,109,0.08); color: var(--text-dim); border-color: var(--border); }

  /* Stats strip */
  .stats-strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    border-bottom: 1px solid var(--border);
  }

  .stat-item {
    padding: 1rem 1.5rem;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-item:last-child { border-right: none; }

  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1;
  }

  .stat-label {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  /* Main grid */
  .main {
    padding: 1.5rem 2rem;
  }

  .deals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1rem;
  }

  /* Deal card */
  .deal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
    position: relative;
    cursor: pointer;
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .deal-card:hover {
    transform: translateY(-2px);
    border-color: #3a3a4a;
  }

  .deal-card.status-active { border-left: 3px solid var(--accent3); }
  .deal-card.status-upcoming { border-left: 3px solid var(--accent2); }
  .deal-card.status-expired { border-left: 3px solid #333; opacity: 0.55; }

  .card-header {
    padding: 0.9rem 1rem 0.7rem;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .brand-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .card-title-wrap { flex: 1; min-width: 0; }

  .brand-name {
    font-size: 0.95rem;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .deal-type-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 3px;
    margin-top: 3px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .badge-bogo { background: rgba(255,77,109,0.15); color: var(--accent); }
  .badge-discount { background: rgba(255,209,102,0.15); color: var(--accent2); }
  .badge-gift { background: rgba(6,214,160,0.15); color: var(--accent3); }
  .badge-member { background: rgba(76,201,240,0.15); color: var(--accent4); }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 6px;
  }

  .status-active .status-dot { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); animation: pulse 2s infinite; }
  .status-upcoming .status-dot { background: var(--accent2); }
  .status-expired .status-dot { background: #444; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .card-body { padding: 0.8rem 1rem; }

  .deal-title {
    font-size: 0.9rem;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  .deal-desc {
    font-size: 0.78rem;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 0.75rem;
  }

  .deal-meta {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .meta-chip {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    padding: 3px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .meta-chip.date-chip { color: var(--text-dim); }

  .days-left {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
  }

  .days-active { color: var(--accent3); }
  .days-soon { color: var(--accent2); }
  .days-expired { color: #555; }

  .card-footer {
    padding: 0.6rem 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cat-label {
    font-size: 0.72rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .cat-食 { color: var(--food); }
  .cat-衣 { color: var(--fashion); }
  .cat-住 { color: var(--living); }
  .cat-行 { color: var(--transport); }
  .cat-育 { color: var(--edu); }
  .cat-樂 { color: var(--fun); }
  .cat-百貨 { color: var(--dept); }

  /* Birthday badge on card */
  .bday-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 3px;
    background: rgba(255,143,171,0.15);
    color: #ff8fab;
    margin-left: 6px;
    letter-spacing: 0.03em;
  }

  /* Birthday panel */
  .bday-panel {
    margin: 0 2rem 0;
    padding: 1.2rem 1.5rem;
    background: rgba(255,143,171,0.04);
    border: 1px solid rgba(255,143,171,0.2);
    border-radius: 10px;
    display: none;
  }

  .bday-panel.open { display: block; }

  .bday-panel-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .bday-panel-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: #ff8fab;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .bday-month-sel {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-left: auto;
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  .bday-month-sel select {
    background: var(--surface2);
    border: 1px solid rgba(255,143,171,0.3);
    color: #ff8fab;
    padding: 0.3rem 0.6rem;
    border-radius: 5px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.82rem;
    outline: none;
    cursor: pointer;
  }

  .bday-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0.75rem;
  }

  .bday-card {
    background: var(--surface);
    border: 1px solid rgba(255,143,171,0.2);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
  }

  .bday-card-top {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .bday-brand { font-weight: 700; font-size: 0.9rem; }

  .bday-title { font-size: 0.82rem; color: var(--text-dim); line-height: 1.4; }

  .bday-desc { font-size: 0.75rem; color: #666; line-height: 1.4; }

  .bday-cat-chip {
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.05);
    color: var(--text-dim);
  }

  .bday-empty {
    text-align: center;
    padding: 2rem;
    color: var(--text-dim);
    font-size: 0.85rem;
    grid-column: 1/-1;
  }

  /* Birthday toggle btn in header */
  .bday-toggle-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.4rem 0.85rem;
    border-radius: 6px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .bday-toggle-btn:hover, .bday-toggle-btn.active {
    border-color: #ff8fab;
    color: #ff8fab;
    background: rgba(255,143,171,0.06);
  }

  /* birthday checkbox in modal */
  .bday-check-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: var(--text-dim);
    cursor: pointer;
    padding: 0.5rem 0;
  }

  .bday-check-row input[type=checkbox] { accent-color: #ff8fab; width: 16px; height: 16px; cursor: pointer; }
  .bday-check-row.checked { color: #ff8fab; }

  .bookmark-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 2px 4px;
    transition: color 0.2s, transform 0.2s;
    line-height: 1;
  }

  .bookmark-btn:hover { color: var(--accent2); transform: scale(1.2); }
  .bookmark-btn.saved { color: var(--accent2); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
    grid-column: 1/-1;
  }

  .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty-state p { font-size: 0.9rem; }

  /* Add deal modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(20px);
    transition: transform 0.2s;
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-header {
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-header h2 { font-size: 1rem; font-weight: 700; }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 1.2rem;
    line-height: 1;
    padding: 4px;
    transition: color 0.2s;
  }

  .modal-close:hover { color: var(--text); }

  .modal-body { padding: 1.2rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; }

  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }

  .form-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    font-family: 'Space Mono', monospace;
  }

  .form-input, .form-select, .form-textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 0.9rem;
    border-radius: 6px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent);
  }

  .form-select option { background: var(--surface2); }

  .form-textarea { resize: vertical; min-height: 70px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

  .btn-primary {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.7rem 1.5rem;
    border-radius: 6px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    width: 100%;
  }

  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:active { transform: scale(0.98); }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    font-size: 1.4rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(255,77,109,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 50;
  }

  .fab:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 28px rgba(255,77,109,0.5);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 1.2rem;
    font-size: 0.85rem;
    z-index: 200;
    transition: transform 0.3s;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a4a; }

  /* Food subtype bar */
  .subtype-bar {
    padding: 0.6rem 2rem;
    background: rgba(255,107,53,0.04);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .subtype-bar.hidden { display: none; }

  .subtype-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--food);
    letter-spacing: 0.1em;
    margin-right: 0.3rem;
  }

  .sub-tab {
    padding: 0.25rem 0.7rem;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.18s;
  }

  .sub-tab:hover { border-color: var(--food); color: var(--food); }
  .sub-tab.active { border-color: var(--food); color: var(--food); background: rgba(255,107,53,0.1); }
  .sub-tab.living-mode:hover { border-color: var(--living); color: var(--living); }
  .sub-tab.living-mode.active { border-color: var(--living); color: var(--living); background: rgba(79,195,247,0.1); }

  .sub-group { display: contents; }

  /* subtype chip on card */
  .subtype-chip {
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(255,107,53,0.12);
    color: var(--food);
    margin-left: 4px;
  }

// ─── State ────────────────────────────────────────────────────────────
const DATA_VER = 'v4'; // bump this to force reload seed
if (localStorage.getItem('tw_deals_ver') !== DATA_VER) {
  localStorage.removeItem('tw_deals');
  localStorage.setItem('tw_deals_ver', DATA_VER);
}
let deals = JSON.parse(localStorage.getItem('tw_deals') || 'null') || SEED;
let filterCat = 'all';
let filterStatus = 'all';
let filterSubtype = 'all';
let searchQ = '';
let bdayMonth = parseInt(localStorage.getItem('tw_bdayMonth') || '0');

const CAT_ICONS = { '食': '🍜', '衣': '👗', '住': '🏨', '行': '🚗', '育': '📚', '樂': '🎉', '百貨': '🏬' };
const TYPE_MAP = {
  '買一送一': { cls: 'badge-bogo', icon: '🔁' },
  '折扣優惠': { cls: 'badge-discount', icon: '💰' },
  '贈品活動': { cls: 'badge-gift', icon: '🎁' },
  '會員專屬': { cls: 'badge-member', icon: '👑' },
};

function save() { localStorage.setItem('tw_deals', JSON.stringify(deals)); }

function getStatus(start, end) {
  const now = new Date(); now.setHours(0,0,0,0);
  const s = new Date(start); const e = new Date(end);
  if (now > e) return 'expired';
  if (now < s) return 'upcoming';
  return 'active';
}

function daysText(start, end) {
  const now = new Date(); now.setHours(0,0,0,0);
  const s = new Date(start); const e = new Date(end);
  const diff = Math.round((e - now) / 86400000);
  const diffStart = Math.round((s - now) / 86400000);
  if (now > e) return { text: '已結束', cls: 'days-expired' };
  if (now < s) return { text: `${diffStart}天後開始`, cls: 'days-soon' };
  if (diff <= 3) return { text: `剩 ${diff} 天！`, cls: 'days-active' };
  return { text: `剩 ${diff} 天`, cls: 'days-active' };
}

function renderCard(d, idx) {
  const st = getStatus(d.start, d.end);
  const dt = daysText(d.start, d.end);
  const tm = TYPE_MAP[d.type] || TYPE_MAP['折扣優惠'];
  const delay = idx * 40;
  const subtypeHtml = ((d.cat === '食' || d.cat === '住') && d.subtype) ? `<span class="subtype-chip" style="${d.cat==='住'?'background:rgba(79,195,247,0.12);color:var(--living)':''}">${d.subtype}</span>` : '';
  const bdayHtml = d.isBday ? `<span class="bday-badge">🎂 壽星</span>` : '';
  return `
  <div class="deal-card status-${st}" data-id="${d.id}" style="animation-delay:${delay}ms">
    <div class="card-header">
      <div class="brand-icon" style="background:rgba(255,255,255,0.05)">${CAT_ICONS[d.cat] || '🏬'}</div>
      <div class="card-title-wrap">
        <div class="brand-name">${d.brand}${subtypeHtml}${bdayHtml}</div>
        <span class="deal-type-badge ${tm.cls}">${tm.icon} ${d.type}</span>
      </div>
      <div class="status-dot"></div>
    </div>
    <div class="card-body">
      <div class="deal-title">${d.title}</div>
      ${d.desc ? `<div class="deal-desc">${d.desc}</div>` : ''}
      <div class="deal-meta">
        <span class="meta-chip date-chip">📅 ${d.start} ～ ${d.end}</span>
        <span class="days-left ${dt.cls}">${dt.text}</span>
      </div>
    </div>
    <div class="card-footer">
      <span class="cat-label cat-${d.cat}">${CAT_ICONS[d.cat] || '🏬'} ${d.cat}</span>
      <div style="display:flex;gap:6px;align-items:center">
        ${d.url ? `<a href="${d.url}" target="_blank" style="font-size:0.7rem;color:var(--text-dim);text-decoration:none;padding:2px 6px;border:1px solid var(--border);border-radius:3px;" onclick="event.stopPropagation()">🔗 來源</a>` : ''}
        <button class="bookmark-btn ${d.saved?'saved':''}" onclick="toggleSave(${d.id},event)" title="收藏">${d.saved?'★':'☆'}</button>
        <button class="bookmark-btn" onclick="deleteDeal(${d.id},event)" title="刪除" style="color:#555">✕</button>
      </div>
    </div>
  </div>`;
}

function renderBday() {
  const grid = document.getElementById('bdayGrid');
  if (!bdayMonth) {
    grid.innerHTML = `<div class="bday-empty">設定生日月份，自動篩選壽星優惠 🎉</div>`;
    return;
  }
  const bdayDeals = deals.filter(d => d.isBday && getStatus(d.start, d.end) !== 'expired');
  if (!bdayDeals.length) {
    grid.innerHTML = `<div class="bday-empty">目前尚無壽星優惠資料，請新增時勾選「壽星優惠」</div>`;
    return;
  }
  grid.innerHTML = bdayDeals.map((d, i) => `
    <div class="bday-card" style="animation-delay:${i*40}ms">
      <div class="bday-card-top">
        <span style="font-size:1rem">${CAT_ICONS[d.cat]||'🏬'}</span>
        <span class="bday-brand">${d.brand}</span>
        <span class="bday-cat-chip">${d.cat}</span>
        <span class="deal-type-badge ${TYPE_MAP[d.type]?.cls||'badge-discount'}" style="margin-left:auto">${TYPE_MAP[d.type]?.icon||'💰'} ${d.type}</span>
      </div>
      <div class="bday-title">${d.title}</div>
      ${d.desc ? `<div class="bday-desc">${d.desc}</div>` : ''}
      ${d.url ? `<a href="${d.url}" target="_blank" style="font-size:0.7rem;color:#ff8fab;text-decoration:none;margin-top:2px;">🔗 官網連結</a>` : ''}
    </div>
  `).join('');
}

function renderAll() {
  const now = new Date(); now.setHours(0,0,0,0);
  let filtered = deals.filter(d => {
    if (filterCat !== 'all' && d.cat !== filterCat) return false;
    if (filterStatus !== 'all' && getStatus(d.start, d.end) !== filterStatus) return false;
    if (filterCat === '食' && filterSubtype !== 'all' && d.subtype !== filterSubtype) return false;
    if (filterCat === '住' && filterSubtype !== 'all' && d.subtype !== filterSubtype) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      if (!d.brand.toLowerCase().includes(q) && !d.title.toLowerCase().includes(q) && !(d.desc||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const grid = document.getElementById('dealsGrid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>沒有符合的優惠方案</p></div>`;
  } else {
    grid.innerHTML = filtered.map((d, i) => renderCard(d, i)).join('');
  }

  // Stats
  document.getElementById('statTotal').textContent = deals.length;
  document.getElementById('statActive').textContent = deals.filter(d => getStatus(d.start,d.end)==='active').length;
  document.getElementById('statUpcoming').textContent = deals.filter(d => getStatus(d.start,d.end)==='upcoming').length;
  document.getElementById('statBogo').textContent = deals.filter(d => d.type==='買一送一').length;
}

function toggleSave(id, e) {
  e.stopPropagation();
  const d = deals.find(x => x.id === id);
  if (d) { d.saved = !d.saved; save(); renderAll(); }
}

function deleteDeal(id, e) {
  e.stopPropagation();
  if (confirm('確認刪除這筆優惠？')) {
    deals = deals.filter(x => x.id !== id);
    save(); renderAll();
    showToast('✓ 已刪除');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Header date ──────────────────────────────────────────────────────
function updateHeaderDate() {
  const now = new Date();
  const mn = ['一','二','三','四','五','六','七','八','九','十','十一','十二'];
  document.getElementById('curMonthBadge').innerHTML =
    `<strong>${now.getFullYear()}</strong> 年 <strong>${mn[now.getMonth()]}</strong> 月`;
}

// ─── Filter controls ─────────────────────────────────────────────────
document.getElementById('catTabs').addEventListener('click', e => {
  const btn = e.target.closest('.cat-tab');
  if (!btn) return;
  filterCat = btn.dataset.cat;
  filterSubtype = 'all';
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Show subtype bar for 食 and 住
  const bar = document.getElementById('subtypeBar');
  const showBar = filterCat === '食' || filterCat === '住';
  bar.classList.toggle('hidden', !showBar);
  if (showBar) {
    // Switch visible group
    document.getElementById('subGroup食').style.display = filterCat === '食' ? 'contents' : 'none';
    document.getElementById('subGroup住').style.display = filterCat === '住' ? 'contents' : 'none';
    // Update label
    document.getElementById('subtypeLabel').textContent = filterCat === '食' ? '餐廳類型' : '住宿類型';
    document.getElementById('subtypeLabel').style.color = filterCat === '食' ? 'var(--food)' : 'var(--living)';
    // Color mode for tabs
    const isLiving = filterCat === '住';
    document.querySelectorAll('.sub-tab').forEach(t => t.classList.toggle('living-mode', isLiving));
  }
  // Reset subtype tabs
  document.querySelectorAll('.sub-tab').forEach(b => b.classList.toggle('active', b.dataset.sub === 'all'));
  renderAll();
});

document.getElementById('subtypeBar').addEventListener('click', e => {
  const btn = e.target.closest('.sub-tab');
  if (!btn) return;
  filterSubtype = btn.dataset.sub;
  document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
});

document.getElementById('statusTabs').addEventListener('click', e => {
  const btn = e.target.closest('.status-tab');
  if (!btn) return;
  filterStatus = btn.dataset.status;
  document.querySelectorAll('.status-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  renderAll();
});

// ─── Modal ────────────────────────────────────────────────────────────
document.getElementById('openModal').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.add('open');
  toggleSubtypeField();
  const now = new Date();
  document.getElementById('fStart').value = now.toISOString().split('T')[0];
  const end = new Date(now); end.setDate(end.getDate()+30);
  document.getElementById('fEnd').value = end.toISOString().split('T')[0];
});

document.getElementById('closeModal').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
});

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
});

function toggleSubtypeField() {
  const cat = document.getElementById('fCat').value;
  const wrap = document.getElementById('fSubtypeWrap');
  const label = document.getElementById('fSubtypeLabel');
  const optFood = document.getElementById('fSubOptFood');
  const optLiving = document.getElementById('fSubOptLiving');
  if (cat === '食') {
    wrap.style.display = 'flex';
    label.textContent = '餐廳/食品類型';
    optFood.style.display = '';
    optLiving.style.display = 'none';
  } else if (cat === '住') {
    wrap.style.display = 'flex';
    label.textContent = '住宿類型';
    optFood.style.display = 'none';
    optLiving.style.display = '';
  } else {
    wrap.style.display = 'none';
  }
  document.getElementById('fSubtype').value = '';
}

document.getElementById('submitDeal').addEventListener('click', () => {
  const brand = document.getElementById('fBrand').value.trim();
  const title = document.getElementById('fTitle').value.trim();
  const start = document.getElementById('fStart').value;
  const end = document.getElementById('fEnd').value;
  if (!brand || !title || !start || !end) {
    showToast('⚠ 請填寫必填欄位');
    return;
  }
  const cat = document.getElementById('fCat').value;
  const newDeal = {
    id: Date.now(),
    cat,
    subtype: (cat === '食' || cat === '住') ? document.getElementById('fSubtype').value : '',
    brand,
    title,
    desc: document.getElementById('fDesc').value.trim(),
    type: document.getElementById('fType').value,
    isBday: document.getElementById('fBday').checked,
    start, end,
    url: document.getElementById('fUrl').value.trim(),
    saved: false,
  };
  deals.unshift(newDeal);
  save();
  renderAll();
  if (newDeal.isBday) renderBday();
  document.getElementById('modalOverlay').classList.remove('open');
  ['fBrand','fTitle','fDesc','fUrl'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fBday').checked = false;
  showToast('✓ 新增成功！');
});

// ─── Birthday panel ───────────────────────────────────────────────────
const bdayBtn = document.getElementById('bdayToggleBtn');
const bdayPanel = document.getElementById('bdayPanel');
const bdayMonthSel = document.getElementById('bdayMonthSel');

// Restore saved month
if (bdayMonth) bdayMonthSel.value = bdayMonth;

bdayBtn.addEventListener('click', () => {
  const isOpen = bdayPanel.classList.toggle('open');
  bdayBtn.classList.toggle('active', isOpen);
  if (isOpen) renderBday();
});

bdayMonthSel.addEventListener('change', () => {
  bdayMonth = parseInt(bdayMonthSel.value);
  localStorage.setItem('tw_bdayMonth', bdayMonth);
  const mn = ['','一','二','三','四','五','六','七','八','九','十','十一','十二'];
  bdayBtn.textContent = bdayMonth ? `🎂 ${mn[bdayMonth]}月壽星` : '🎂 壽星優惠';
  renderBday();
});

// Restore btn label on load
if (bdayMonth) {
  const mn = ['','一','二','三','四','五','六','七','八','九','十','十一','十二'];
  bdayBtn.textContent = `🎂 ${mn[bdayMonth]}月壽星`;
}

// ─── Init ─────────────────────────────────────────────────────────────
updateHeaderDate();
renderAll();
</script>
</body>
</html>
